<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Biography</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">

        <header>
            <h1><i class="fas fa-user"></i> My Biography</h1>
            <p class="subtitle">Welcome to my personal website</p>
        </header>

        <!-- BIO SECTION -->
        <section>
            <h2><i class="fas fa-book"></i> About Me</h2>

            <div class="bio-preview">
                <p>Hello! My name is Alex. I am interested in web development, design, and technology.</p>
                <p>I enjoy learning new programming skills and building creative projects.</p>
                <p>In my free time, I like photography and traveling.</p>
            </div>
        </section>

        <!-- IMAGES SECTION -->
        <section>
            <h2><i class="fas fa-images"></i> My Images</h2>

            <div class="image-gallery">

                <div class="image-item">
                    <img src="images/profile.jpg" alt="Profile picture">
                </div>

                <div class="image-item">
                    <img src="images/photo1.jpg" alt="Photo 1">
                </div>

                <div class="image-item">
                    <img src="images/photo2.jpg" alt="Photo 2">
                </div>

            </div>
        </section>

        <footer>
            <p>Made with <i class="fas fa-heart"></i></p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
