<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Biography</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-user"></i> My Biography</h1>
            <p class="subtitle">A showcase of my story and moments</p>
        </header>

        <main>
            <section class="editor-section">
                <h2><i class="fas fa-edit"></i> Edit Your Biography</h2>
                <div class="editor-container">
                    <textarea id="bioEditor" placeholder="Write about yourself here..."></textarea>
                    <div class="editor-actions">
                        <button id="saveBio" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Biography
                        </button>
                        <button id="resetBio" class="btn btn-secondary">
                            <i class="fas fa-undo"></i> Reset
                        </button>
                    </div>
                </div>
            </section>

            <section class="preview-section">
                <h2><i class="fas fa-eye"></i> Biography Preview</h2>
                <div class="bio-preview" id="bioPreview">
                    <p>Your biography will appear here...</p>
                </div>
            </section>

            <section class="images-section">
                <h2><i class="fas fa-images"></i> My Images</h2>
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click or drag images here to upload</p>
                    <input type="file" id="imageUpload" accept="image/*" multiple>
                </div>
                <div class="image-gallery" id="imageGallery">
                    <p class="placeholder">No images uploaded yet.</p>
                </div>
                <div class="image-actions">
                    <button id="clearImages" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Clear All Images
                    </button>
                </div>
            </section>
        </main>

        <footer>
            <p>Created with <i class="fas fa-heart"></i> • Data is saved in your browser</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
